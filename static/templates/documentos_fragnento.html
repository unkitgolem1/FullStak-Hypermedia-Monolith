{% for doc in documentos %}
<div class="glass w-64 p-6 rounded-2xl shadow-xl hover:scale-105 transition-transform">
    <h3 class="font-bold text-lg mb-2">{{ doc.nombre }}</h3>
    <p class="text-blue-300 text-xs">{{ doc.fecha_creacion }}</p>
    <a href="/descargar/{{ doc.id }}" class="mt-4 block text-center text-[10px] border border-white/30 py-1 rounded hover:bg-white/20">
        ACCEDER
    </a>
</div>
{% endfor %}
