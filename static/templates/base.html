<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DANIEL MARI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Outfit', sans-serif; }
        
        /* Renderizado nítido de píxeles */
        .pixel-text-shadow { image-rendering: pixelated; }

        @keyframes slideInOut {
            0% { transform: translateY(100%); opacity: 0; }
            30% { transform: translateY(0); opacity: 1; }
            70% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }

        /* Glass + Neumorphism combo */
        .glass-neumo {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow:
                -10px -10px 24px rgba(255,255,255,0.02),
                18px 18px 40px rgba(2,6,23,0.6),
                inset 6px 6px 18px rgba(0,0,0,0.45),
                inset -6px -6px 18px rgba(255,255,255,0.02);
        }

        .glass-neumo::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(1200px 400px at 10% 10%, rgba(0,0,0,0.35), transparent 20%),
                        radial-gradient(800px 250px at 90% 90%, rgba(255,255,255,0.03), transparent 20%);
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <header id="hero" class="h-screen flex flex-col items-center justify-center relative">
        <h1 class="text-3xl md:text-5xl tracking-tight flex flex-wrap justify-center overflow-hidden cursor-default pixel-text-shadow" 
            style="font-family: 'Press Start 2P', cursive;">
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0s; color: #CA402A;">D</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.16s; color: #0E694F;">A</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.32s; color: #6EB453;">N</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.48s; color: #AED953;">I</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.64s; color: #FDFF55;">E</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.80s; color: #CA402A;">L</span>
        
        <!-- Espacio físico estilo pixel -->
        <span class="w-6 inline-block"></span>
        
        <!-- MARI -->
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.96s; color: #0E694F;">M</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 1.12s; color: #6EB453;">A</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 1.28s; color: #AED953;">R</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 1.44s; color: #FDFF55;">I</span>
    </h1>         

        <p class="mt-6 text-slate-300 font-mono text-xs md:text-sm uppercase tracking-[0.25em] border-t border-slate-800 pt-4 text-center max-w-xl px-4">
            Seguridad, Infraestructura/Nube & Datos
        </p>

        <a href="#proyectos" class="absolute bottom-10 animate-bounce bg-white/10 p-4 rounded-full border border-white/20 hover:bg-white/20 transition-all">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </a>

    </header>

    <main id="proyectos" class="min-h-screen flex flex-col items-center justify-center py-20 px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
