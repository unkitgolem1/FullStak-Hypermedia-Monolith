<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DANIEL MARI{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Outfit', sans-serif; }
        
        /* Renderizado nítido de píxeles */
        .pixel-text-shadow { image-rendering: pixelated; }

        @keyframes slideInOut {
            0% { transform: translateY(100%); opacity: 0; }
            30% { transform: translateY(0); opacity: 1; }
            70% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100%); opacity: 0; }
        }

        /* Glass + Neumorphism combo */
        .glass-neumo {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px) saturate(120%);
            -webkit-backdrop-filter: blur(10px) saturate(120%);
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow:
                -10px -10px 24px rgba(255,255,255,0.02),
                18px 18px 40px rgba(2,6,23,0.6),
                inset 6px 6px 18px rgba(0,0,0,0.45),
                inset -6px -6px 18px rgba(255,255,255,0.02);
        }

        /* Markdown content styling */
        .markdown-body h1, .markdown-body h2, .markdown-body h3,
        .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            color: #f1f5f9;
            font-family: ui-monospace, monospace;
            font-weight: 700;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            letter-spacing: -0.025em;
        }
        .markdown-body h1 { font-size: 1.25rem; }
        .markdown-body h2 { font-size: 1.125rem; }
        .markdown-body h3 { font-size: 1rem; }
        .markdown-body p { margin-bottom: 0.75em; line-height: 1.625; color: #94a3b8; }
        .markdown-body ul, .markdown-body ol { padding-left: 1.5em; margin-bottom: 0.75em; color: #94a3b8; }
        .markdown-body li { margin-bottom: 0.25em; }
        .markdown-body code {
            background: rgba(15, 23, 42, 0.8);
            padding: 0.15em 0.4em;
            border-radius: 0.375rem;
            font-size: 0.8125rem;
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .markdown-body pre {
            background: #0d1424;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin-bottom: 1em;
            border: 1px solid rgba(0,0,0,0.3);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.5), inset -2px -2px 6px rgba(255,255,255,0.02);
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            border: none;
            color: #cbd5e1;
        }
        .markdown-body a { color: #60a5fa; text-decoration: underline; text-underline-offset: 2px; }
        .markdown-body a:hover { color: #93bbfc; }
        .markdown-body blockquote {
            border-left: 3px solid #334155;
            padding-left: 1em;
            margin: 1em 0;
            color: #64748b;
            font-style: italic;
        }
        .markdown-body img { max-width: 100%; border-radius: 0.5rem; margin: 1em 0; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 1em 0; }
        .markdown-body th, .markdown-body td {
            border: 1px solid #1e293b;
            padding: 0.5em 0.75em;
            text-align: left;
            color: #94a3b8;
        }
        .markdown-body th { background: #0d1424; color: #e2e8f0; font-family: monospace; font-size: 0.75rem; }

        .glass-neumo::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(1200px 400px at 10% 10%, rgba(0,0,0,0.35), transparent 20%),
                        radial-gradient(800px 250px at 90% 90%, rgba(255,255,255,0.03), transparent 20%);
            mix-blend-mode: multiply;
        }
    </style>
</head>
<body>
    <header id="hero" class="h-screen flex flex-col items-center justify-center relative">
        <h1 class="text-3xl md:text-5xl tracking-tight flex flex-wrap justify-center overflow-hidden cursor-default pixel-text-shadow" 
            style="font-family: 'Press Start 2P', cursive;">
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0s; color: #CA402A;">D</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.16s; color: #0E694F;">A</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.32s; color: #6EB453;">N</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.48s; color: #AED953;">I</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.64s; color: #FDFF55;">E</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.80s; color: #CA402A;">L</span>
        
        <!-- Espacio físico estilo pixel -->
        <span class="w-6 inline-block"></span>
        
        <!-- MARI -->
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 0.96s; color: #0E694F;">M</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 1.12s; color: #6EB453;">A</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 1.28s; color: #AED953;">R</span>
        <span class="inline-block animate-[slideInOut_4s_ease_infinite_alternate] opacity-0" style="animation-delay: 1.44s; color: #FDFF55;">I</span>
    </h1>         

        <p class="mt-6 text-slate-300 font-mono text-xs md:text-sm uppercase tracking-[0.25em] border-t border-slate-800 pt-4 text-center max-w-xl px-4">
            Seguridad, Infraestructura/Nube & Datos
        </p>

        <a href="#proyectos" class="absolute bottom-10 animate-bounce bg-white/10 p-4 rounded-full border border-white/20 hover:bg-white/20 transition-all">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </a>

    </header>

    <main id="proyectos" class="min-h-screen flex flex-col items-center justify-center py-20 px-4">
        {% block content %}{% endblock %}
    </main>
<div id="modal-contenido" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4" onclick="if(event.target===this) window.cerrarModal()">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-md"></div>
    <div class="relative w-full max-w-2xl max-h-[85vh] overflow-y-auto glass-neumo rounded-2xl p-6 md:p-8 z-10">
        <button onclick="window.cerrarModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors text-2xl leading-none z-20">&times;</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    window.abrirModal = function() {
        document.getElementById('modal-contenido').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    };
    window.cerrarModal = function() {
        document.getElementById('modal-contenido').classList.add('hidden');
        document.body.style.overflow = '';
    };
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') window.cerrarModal();
    });

    // ─── Caché cliente para respuestas htmx ─────────────────────────
    (function() {
        const cache = new Map();
        const TTL = 5 * 60 * 1000; // 5 minutos

        document.addEventListener('htmx:afterSettle', function(evt) {
            const el = evt.detail.elt;
            const url = el.getAttribute('hx-get');
            if (!url) return;
            const selector = el.getAttribute('hx-target');
            if (!selector) return;
            const target = document.querySelector(selector);
            if (!target) return;
            cache.set(url, {
                html: target.innerHTML,
                expira: Date.now() + TTL
            });
        });

        document.addEventListener('htmx:beforeRequest', function(evt) {
            const el = evt.detail.elt;
            const url = el.getAttribute('hx-get');
            if (!url) return;
            const cached = cache.get(url);
            if (!cached || Date.now() > cached.expira) {
                cache.delete(url);
                return;
            }
            evt.preventDefault();
            const selector = el.getAttribute('hx-target');
            if (!selector) return;
            const target = document.querySelector(selector);
            if (target) {
                target.innerHTML = cached.html;
            }
        });
    })();
</script>
</body>
</html>
