<p class="text-slate-500 font-mono text-[9px] tracking-wider mb-2" style="font-family:'Press Start 2P',monospace;">
    &gt; ls -la ./proyectos/
</p>

{% if proyectos %}
<div class="flex flex-wrap gap-1.5">
    {% for proy in proyectos %}
    <div onclick="this.querySelector('a').click()"
         class="group relative flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl cursor-pointer transition-all duration-200
                bg-[rgba(255,255,255,0.04)] hover:bg-[rgba(255,255,255,0.07)]
                border border-[rgba(255,255,255,0.06)] hover:border-[rgba(255,255,255,0.12)]
                shadow-[-2px_-2px_6px_rgba(255,255,255,0.01),3px_3px_10px_rgba(2,6,23,0.4)]
                hover:shadow-[0_0_14px_rgba(255,255,255,0.06)]"
         style="animation:pixelBounce 1.8s ease-in-out infinite;animation-delay:{{ loop.index0 * 0.08 }}s">

        <a href="/api/contenido-md/{{ proy.id }}"
           hx-get="/api/contenido-md/{{ proy.id }}"
           hx-target="#modal-body"
           hx-swap="innerHTML"
           onclick="event.preventDefault(); window.abrirModal();"
           class="absolute inset-0 rounded-xl"></a>

        {% if proy.imagen %}
        <img src="{{ proy.imagen }}" alt="{{ proy.titulo }}"
             class="w-5 h-5 rounded object-cover shrink-0 ring-1 ring-white/10"
             loading="lazy" />
        {% endif %}

        <span class="text-[11px] font-mono text-slate-300 font-medium truncate max-w-[140px] group-hover:text-white transition-colors">
            {{ proy.titulo }}
        </span>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-slate-500 text-sm font-mono text-center py-4">— Sin proyectos —</p>
{% endif %}
