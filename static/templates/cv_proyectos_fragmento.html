{% if proyectos %}
<div class="flex flex-wrap gap-2">
    {% for proy in proyectos %}
    <div onclick="this.querySelector('a').click()"
         class="group relative flex items-center gap-2 px-3 py-2 rounded-full cursor-pointer transition-all duration-300
                bg-[rgba(255,255,255,0.04)] backdrop-blur-[6px]
                border border-[rgba(255,255,255,0.06)]
                hover:border-[rgba(255,255,255,0.15)]
                shadow-[-3px_-3px_8px_rgba(255,255,255,0.01),4px_4px_12px_rgba(2,6,23,0.4)]
                hover:shadow-[0_0_18px_rgba(255,255,255,0.08),0_0_40px_rgba(255,255,255,0.03)]">

        <a href="/api/contenido-md/{{ proy.id }}"
           hx-get="/api/contenido-md/{{ proy.id }}"
           hx-target="#modal-body"
           hx-swap="innerHTML"
           onclick="event.preventDefault(); window.abrirModal();"
           class="absolute inset-0 rounded-full"></a>

        {% if proy.imagen %}
        <img src="{{ proy.imagen }}" alt="{{ proy.titulo }}"
             class="w-6 h-6 rounded-full object-cover shrink-0 ring-1 ring-white/10 group-hover:ring-white/20 transition-all"
             loading="lazy" />
        {% endif %}

        <span class="text-[11px] font-mono text-slate-300 font-semibold whitespace-nowrap group-hover:text-white transition-colors">
            {{ proy.titulo }}
        </span>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="text-slate-500 text-sm font-mono text-center py-4">— Sin proyectos —</p>
{% endif %}
