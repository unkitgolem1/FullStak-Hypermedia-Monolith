{% extends "base.html" %}

{% block content %}
<div class="mx-auto mb-8 w-full max-w-5xl p-4 md:p-6 rounded-2xl relative" aria-hidden="true">
    <div class="glass-neumo relative rounded-2xl overflow-hidden min-h-[450px] flex flex-col">
        <div class="absolute inset-0 bg-gradient-to-br from-white/6 via-white/2 to-transparent pointer-events-none"></div>

        <div class="relative p-6 md:p-8 border-b border-white/10 flex flex-col items-center text-center">
            <h2 class="text-xl md:text-2xl font-bold text-white/95 font-mono tracking-tight">
                PROYECTOS
            </h2>
        </div>

        <div id="wrapper" class="relative flex-grow flex flex-col items-center justify-center p-6 md:p-8">

            <button id="btn-volver" onclick="document.getElementById('btn-volver').style.display='none'; document.getElementById('btn-group').style.display='flex'; document.getElementById('contenedor-cartas').innerHTML=''; document.querySelectorAll('[hx-get]').forEach(function(e){htmx.trigger(e,'htmx:abort')})"
                class="mb-6 px-5 py-2.5 rounded-xl text-slate-300 font-mono text-xs font-black uppercase tracking-widest transition-all duration-150
                bg-[#1a263d]/50 border border-white/5
                shadow-[3px_3px_6px_rgba(0,0,0,0.4),-2px_-2px_6px_rgba(255,255,255,0.02)]
                hover:bg-[#1e2c46]/70 hover:text-white active:scale-[0.98]" style="display:none">
                ← VOLVER
            </button>
            
            <div id="btn-group" class="flex flex-col items-center gap-5 w-full max-w-md mx-auto">
                <div class="flex flex-col gap-4 w-full">
                    <button 
                        hx-get="/api/obtener-documentos" 
                        hx-target="#contenedor-cartas" 
                        hx-swap="innerHTML"
                        hx-push-url="false"
                        onclick="document.getElementById('btn-group').style.display='none'; document.getElementById('btn-volver').style.display='inline-block'"
                        class="w-full px-6 py-5 text-left font-black uppercase tracking-[0.15em] transition-all duration-300 
                        bg-[rgba(220,38,38,0.06)] hover:bg-[rgba(220,38,38,0.12)]
                        border-2 border-red-500/30 hover:border-red-500/70
                        shadow-[4px_4px_0_rgba(220,38,38,0.3)] hover:shadow-[6px_6px_0_rgba(220,38,38,0.5)]
                        active:translate-x-[2px] active:translate-y-[2px] active:shadow-[2px_2px_0_rgba(220,38,38,0.3)]
                        text-red-100 text-xs md:text-sm rounded-none"
                        style="image-rendering:pixelated; font-family:'Press Start 2P',monospace;">
                        <span class="block text-[9px] md:text-[10px] tracking-[0.3em] text-red-400/60 mb-1">&gt; cd /proyectos</span>
                        <span class="block">PROYECTOS</span>
                    </button>
                    <button 
                        hx-get="/api/cv" 
                        hx-target="#contenedor-cartas" 
                        hx-swap="innerHTML"
                        hx-push-url="false"
                        onclick="document.getElementById('btn-group').style.display='none'; document.getElementById('btn-volver').style.display='inline-block'"
                        class="w-full px-6 py-5 text-left font-black uppercase tracking-[0.15em] transition-all duration-300 
                        bg-[rgba(16,185,129,0.06)] hover:bg-[rgba(16,185,129,0.12)]
                        border-2 border-emerald-500/30 hover:border-emerald-500/70
                        shadow-[4px_4px_0_rgba(16,185,129,0.3)] hover:shadow-[6px_6px_0_rgba(16,185,129,0.5)]
                        active:translate-x-[2px] active:translate-y-[2px] active:shadow-[2px_2px_0_rgba(16,185,129,0.3)]
                        text-emerald-100 text-xs md:text-sm rounded-none"
                        style="image-rendering:pixelated; font-family:'Press Start 2P',monospace;">
                        <span class="block text-[9px] md:text-[10px] tracking-[0.3em] text-emerald-400/60 mb-1">&gt; cat cv.html</span>
                        <span class="block">VER CV</span>
                    </button>
                </div>
                <p id="instruccion" class="text-slate-500 font-mono text-[10px] tracking-wider animate-bounce text-center" style="font-family:'Press Start 2P',monospace;">
                    &gt; next: haz clic en algo o presiona Ctrl+C para salir_
                </p>
            </div>

            <div id="contenedor-cartas" class="w-full flex flex-wrap justify-center gap-6 mt-6">
                </div>
            
        </div>
    </div>
</div>
{% endblock %}
